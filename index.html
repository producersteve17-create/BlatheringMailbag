    <meta charset="UTF-8">

    <title>The Blathering Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-green: rgba(34, 197, 94, 0.5);
        }
        body {
            /* Changed to Lilita One */
            font-family: 'Lilita One', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            gap: 30px;
            
            /* Added subtle black outline to text */
            -webkit-text-stroke: 0.5px #000;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .hero-logo {
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 30px var(--neon-green));
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 5;
            border-top: 3px solid #22c55e; 
            display: flex;
            flex-direction: column;
            gap: 15px; /* Default spacing between buttons */
        }
        
        .btn-link {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .btn-link:hover {
            background-color: var(--accent-hover);
        }
        
        .btn-patreon {
            background-color: #f96854; 
        }
        .btn-patreon:hover {
            background-color: #e05b49;
        }
        
        /* Special styling to separate the top voicemail button */
        .btn-voicemail {
            background-color: #10b981; /* Matches your success/green theme */
            margin-bottom: 15px; /* Adds extra separation from the rest of the list */
        }
        .btn-voicemail:hover {
            background-color: #059669;
        }
        
        /* New layout for the side-by-side live boxes */
        .live-boxes-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .live-box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px 20px; /* Increased padding for larger size */
            min-height: 120px; /* Added min-height for chunkier boxes */
            flex: 1; /* This makes both boxes take up exactly 50% of the space */
            text-align: center;
            font-size: 0.9em;
            line-height: 1.4;
            border: 2px solid var(--text-muted); /* Gives it a distinct box look */
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Ensures text stands out clearly over the background images */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        } 
        
        /* Specific IDs for the background images and overlays */
        #live-box-main {
            /* Stacks a dark, 85% opacity overlay right on top of the image */
            background-image: linear-gradient(rgba(30, 41, 59, 0.85), rgba(30, 41, 59, 0.85)), url('tbc-logo.png');
        }

        #live-box-gaming {
            background-image: linear-gradient(rgba(30, 41, 59, 0.85), rgba(30, 41, 59, 0.85)), url('gaminglogo.png');
        }
        
    </style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P3JK22CL"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<img src="tbc-logo.png" alt="The Blathering Live Logo" class="hero-logo">

<div class="container">
    <a href="/voicemail" id="track-voicemail" class="btn-link btn-voicemail">Blathering Voicemail</a>

    <a href="https://www.youtube.com/@KenNapzok" id="track-youtube-main" target="_blank" class="btn-link">The Blathering on YouTube</a>
    <a href="https://www.patreon.com/cw/KenNapzok" id="track-patreon" target="_blank" class="btn-link btn-patreon">Support Ken on Patreon</a>
    <a href="https://www.youtube.com/@BlatheringGaming" id="track-youtube-gaming" target="_blank" class="btn-link">Blathering Gaming Channel</a>
    <a href="https://linktr.ee/morningdrivemedia" id="track-more-links" target="_blank" class="btn-link" style="background-color: #475569;">More Links</a>
</div>

<div class="live-boxes-wrapper">
    <div id="live-box-main" class="live-box">
        The Blathering Live - Every Monday, Thursday and sometimes Saturday
    </div>
    <div id="live-box-gaming" class="live-box">
        Check Discord or Producer Steve on Bluesky for gaming stream schedules!
    </div>
</div>
