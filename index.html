<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blathering Live</title>
    <!-- Import Lilita One from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-green: rgba(34, 197, 94, 0.5);
        }
        body {
            /* Changed to Lilita One */
            font-family: 'Lilita One', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            gap: 30px;
        }

        .hero-logo {
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 30px var(--neon-green));
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 5;
            border-top: 3px solid #22c55e; 
            display: flex;
            flex-direction: column;
            gap: 15px; /* Default spacing between buttons */
        }
        
        .btn-link {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .btn-link:hover {
            background-color: var(--accent-hover);
        }
        
        .btn-patreon {
            background-color: #f96854; 
        }
        .btn-patreon:hover {
            background-color: #e05b49;
        }
        
        /* Special styling to separate the top voicemail button */
        .btn-voicemail {
            background-color: #10b981; /* Matches your success/green theme */
            margin-bottom: 15px; /* Adds extra separation from the rest of the list */
        }
        .btn-voicemail:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

<img src="tbc-logo.png" alt="The Blathering Live Logo" class="hero-logo">

<div class="container">
    <!-- Emojis removed -->
    <a href="/voicemail" class="btn-link btn-voicemail">Blathering Voicemail</a>

    <!-- The rest of the link tree with emojis removed -->
    <a href="https://www.youtube.com/@KenNapzok" target="_blank" class="btn-link">The Blathering on YouTube</a>
    <a href="https://www.patreon.com/cw/KenNapzok" target="_blank" class="btn-link btn-patreon">Support Ken on Patreon</a>
    <a href="https://www.youtube.com/@BlatheringGaming" target="_blank" class="btn-link">Blathering Gaming Channel</a>
    <a href="https://linktr.ee/morningdrivemedia" target="_blank" class="btn-link" style="background-color: #475569;">More Links</a>
</div>

</body>
</html>
