    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blathering Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-green: rgba(34, 197, 94, 0.5);
        }
        body {
            font-family: 'Lilita One', sans-serif;
            font-size: 18px; /* Increased base font size */
            background: linear-gradient(135deg, #0b0f19 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            gap: 30px;
            
            /* Subtle black outline to text */
            -webkit-text-stroke: 0.5px #000;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .hero-logo {
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 30px var(--neon-green));
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px 30px; /* Added a bit more vertical padding */
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px; /* Widened slightly to accommodate larger buttons */
            position: relative;
            z-index: 5;
            border-top: 3px solid #22c55e; 
            display: flex;
            flex-direction: column;
            gap: 18px; /* Increased spacing between buttons */
        }
        
        .btn-link {
            display: block;
            width: 100%;
            padding: 18px; /* Increased from 15px for taller, chunkier buttons */
            font-size: 22px; /* Explicitly increased button text size */
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            box-sizing: border-box;
            transition: background 0.2s;
            letter-spacing: 0.5px; /* Slight letter spacing for better readability */
        }

        .btn-link:hover {
            background-color: var(--accent-hover);
        }
        
        .btn-patreon {
            background-color: #f96854; 
        }
        .btn-patreon:hover {
            background-color: #e05b49;
        }
        
        /* Special styling to separate the top voicemail button */
        .btn-voicemail {
            background-color: #10b981;
            margin-bottom: 15px; 
            font-size: 24px; /* Making the main call to action slightly larger */
        }
        .btn-voicemail:hover {
            background-color: #059669;
        }
        
        /* Layout for the side-by-side live boxes */
        .live-boxes-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 480px; /* Match new container width */
        }

        .live-box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px 20px; 
            min-height: 120px; 
            flex: 1; 
            text-align: center;
            font-size: 1.2em; /* Increased text size from 0.9em */
            line-height: 1.4;
            border: 2px solid var(--text-muted); 
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Ensures text stands out clearly over the background images */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        } 
        
        /* Specific IDs for the background images and overlays */
        #live-box-main {
            background-image: linear-gradient(rgba(30, 41, 59, 0.85), rgba(30, 41, 59, 0.85)), url('tbc-logo.png');
        }

        #live-box-gaming {
            background-image: linear-gradient(rgba(30, 41, 59, 0.85), rgba(30, 41, 59, 0.85)), url('gaminglogo.png');
        }
        
    </style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P3JK22CL"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<img src="tbc-logo.png" alt="The Blathering Live Logo" class="hero-logo">

<div class="container">
    <a href="/voicemail" id="track-voicemail" class="btn-link btn-voicemail">Blathering Voicemail</a>

    <a href="https://www.youtube.com/@KenNapzok" id="track-youtube-main" target="_blank" class="btn-link">The Blathering on YouTube</a>
    <a href="https://www.patreon.com/cw/KenNapzok" id="track-patreon" target="_blank" class="btn-link btn-patreon">Support Ken on Patreon</a>
    <a href="https://www.youtube.com/@BlatheringGaming" id="track-youtube-gaming" target="_blank" class="btn-link">Blathering Gaming Channel</a>
    <a href="https://linktr.ee/morningdrivemedia" id="track-more-links" target="_blank" class="btn-link" style="background-color: #475569;">More Links</a>
</div>

<div class="live-boxes-wrapper">
    <div id="live-box-main" class="live-box">
        The Blathering Live - Every Monday, Thursday and sometimes Saturday
    </div>
    <div id="live-box-gaming" class="live-box">
        Check Discord or Producer Steve on Bluesky for gaming stream schedules!
    </div>
</div>
</body>
