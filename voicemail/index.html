<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blathering - Mailbag Segment</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-green: rgba(34, 197, 94, 0.5); 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            gap: 30px; 
        }

        .hero-logo {
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 30px var(--neon-green));
            animation: float 6s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 5;
            border-top: 3px solid #22c55e; 
        }
        h2 { margin-top: 0; text-align: center; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        textarea { resize: vertical; height: 80px; }
        .option-divider {
            text-align: center;
            margin: 15px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
        }
        .record-box {
            background-color: #0f172a;
            border: 1px dashed #475569;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-primary:disabled { background-color: #475569; cursor: not-allowed; }
        .btn-record { background-color: #ef4444; color: white; margin-bottom: 10px; }
        .btn-record.recording { background-color: #b91c1c; animation: pulse 1.5s infinite; }
        audio { width: 100%; margin-top: 10px; }
        #statusMessage { text-align: center; margin-top: 15px; font-weight: 500; }
        .hidden { display: none !important; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<img src="../tbc-logo.png" alt="The Blathering Live Logo" class="hero-logo">

<div class="container">
    <div id="accessDenied" class="hidden">
        <h2 style="color: #ef4444;">Members Only</h2>
        <p class="subtitle">YouTube Channel Members/Patreon supporters, please check community posts for the updated voicemail link.</p>
    </div>

    <div id="mailbagForm" class="hidden">
        <h2>Submit to the Blathering Mailbag!</h2>
        <p class="subtitle">Record or upload an audio file to hear on the show!</p>
        
        <form id="uploadForm">
            <div class="form-group">
                <label for="viewerName">Your Name / Handle</label>
                <input type="text" id="viewerName" required placeholder="e.g., JarJarDrinks">
            </div>

            <div class="form-group">
                <label>Option 1: Record Right Now</label>
                <div class="record-box">
                    <button type="button" id="recordBtn" class="btn-record">🎙️ Start Recording</button>
                    <div id="recordTimer" class="hidden" style="color: var(--text-muted); font-size: 0.85rem;">0:00</div>
                    <audio id="audioPreview" controls class="hidden"></audio>
                </div>
            </div>

            <div class="option-divider">— OR —</div>

            <div class="form-group">
                <label for="fileInput">Option 2: Upload an Audio File</label>
                <input type="file" id="fileInput" accept="audio/*">
            </div>

            <div class="form-group">
                <label for="producerNotes">Other instructions for Producer Steve</label>
                <textarea id="producerNotes" placeholder="Any context, pronounciation or notes for Producer Steve? (not required)"></textarea>
            </div>

            <div style="display:none !important; visibility:hidden !important;">
                <input type="text" id="honeypot_field" autocomplete="off" tabindex="-1">
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" disabled>Send Message to Drive</button>
        </form>
        <div id="statusMessage"></div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const ACTIVE_SHOW_KEY = "blatherpack69"; 
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBtjIKMtAmfR3WAEKey3kspLG0XR16Beml48OztrDkML3aOut1SsTeAySH9Ba0YGwI/exec";

    // --- ACCESS CONTROL CHECK ---
    const urlParams = new URLSearchParams(window.location.search);
    const providedKey = urlParams.get('key');

    if (providedKey === ACTIVE_SHOW_KEY) {
        document.getElementById('mailbagForm').classList.remove('hidden');
    } else {
        document.getElementById('accessDenied').classList.remove('hidden');
    }

    // --- AUDIO RECORDING LOGIC ---
    let mediaRecorder;
    let audioChunks = [];
    let recordedBlob = null;
    let timerInterval;
    const recordBtn = document.getElementById('recordBtn');
    const audioPreview = document.getElementById('audioPreview');
    const fileInput = document.getElementById('fileInput');
    const submitBtn = document.getElementById('submitBtn');
    const recordTimer = document.getElementById('recordTimer');

    recordBtn.addEventListener('click', async () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            recordBtn.textContent = "🎙️ Re-record";
            recordBtn.classList.remove('recording');
            recordTimer.classList.add('hidden');
        } else {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(recordedBlob);
                    audioPreview.src = audioUrl;
                    audioPreview.classList.remove('hidden');
                    fileInput.value = ""; 
                    validateForm();
                };

                mediaRecorder.start();
                recordBtn.textContent = "⏹️ Stop Recording";
                recordBtn.classList.add('recording');
                
                recordTimer.classList.remove('hidden');
                let seconds = 0;
                recordTimer.textContent = "0:00";
                timerInterval = setInterval(() => {
                    seconds++;
                    let mins = Math.floor(seconds / 60);
                    let secs = seconds % 60;
                    recordTimer.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }, 1000);

            } catch (err) {
                alert("Microphone access denied or not supported by your browser.");
                console.error(err);
            }
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            recordedBlob = null; 
            audioPreview.classList.add('hidden');
            audioPreview.src = "";
            recordBtn.textContent = "🎙️ Start Recording";
        }
        validateForm();
    });

    function validateForm() {
        if (recordedBlob || fileInput.files.length > 0) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    }

    // --- FORM SUBMISSION & BASE64 CONVERSION ---
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const honey = document.getElementById('honeypot_field').value;
        if (honey) {
            console.warn("Bot detected via honeypot.");
            document.getElementById('statusMessage').style.color = "#10b981";
            document.getElementById('statusMessage').textContent = "🚀 Message sent successfully! Check out the show!";
            document.getElementById('uploadForm').reset();
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.textContent = "Uploading... Please wait.";
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.style.color = "var(--text-muted)";
        statusDiv.textContent = "Processing audio file...";

        let finalBlob = recordedBlob;
        let mimeType = "audio/mp3";

        if (fileInput.files.length > 0) {
            finalBlob = fileInput.files[0];
            mimeType = finalBlob.type;
        }

        const reader = new FileReader();
        reader.readAsDataURL(finalBlob);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1]; 
            
            const payload = {
                name: document.getElementById('viewerName').value,
                notes: document.getElementById('producerNotes').value,
                mimeType: mimeType,
                audioBase64: base64Data
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                statusDiv.style.color = "#10b981";
                statusDiv.textContent = "🚀 Message sent successfully! Check out the show!";
                document.getElementById('uploadForm').reset();
                audioPreview.classList.add('hidden');
                recordedBlob = null;
                submitBtn.textContent = "Send Message to Drive";
            } catch (error) {
                statusDiv.style.color = "#ef4444";
                statusDiv.textContent = "Error sending message. Please try again.";
                submitBtn.disabled = false;
                submitBtn.textContent = "Send Message to the Blathering Mailbag";
                console.error(error);
            }
        };
    });
</script>

</body>
</html>
